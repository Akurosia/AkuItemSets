name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      IsCI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
          unzip -q /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Restore
        run: dotnet restore AkuItemSets.csproj

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep -oPm1 '(?<=<Version>)[^<]+' AkuItemSets.csproj)"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Build
        run: |
          dotnet build AkuItemSets.csproj \
            -c Release \
            --no-restore \
            --nologo \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }} \
            -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Collect packaged artifact
        shell: bash
        run: |
          set -euo pipefail

          package_path="$(find bin/Release -path '*/latest.zip' -type f | head -n 1)"
          if [[ -z "${package_path}" ]]; then
            echo "Could not find latest.zip under bin/Release"
            find bin/Release -maxdepth 4 -type f -print
            exit 1
          fi

          mkdir -p artifacts
          cp "$package_path" artifacts/latest.zip
          sha512sum artifacts/latest.zip > artifacts/checksums.sha512
          unzip -l artifacts/latest.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkuItemSets-${{ steps.version.outputs.version }}
          path: |
            artifacts/latest.zip
            artifacts/checksums.sha512
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/latest.zip
            artifacts/checksums.sha512
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Update repo.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ steps.version.outputs.version }}"
          download_url="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.zip"

          jq \
            --arg release_version "$release_version" \
            --arg download_url "$download_url" \
            '.[0].AssemblyVersion = $release_version |
             .[0].TestingAssemblyVersion = $release_version |
             .[0].DownloadLinkInstall = $download_url |
             .[0].DownloadLinkUpdate = $download_url |
             .[0].DownloadLinkTesting = $download_url' \
            repo.json > repo.tmp.json

          mv repo.tmp.json repo.json
          cat repo.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json

          if git diff --cached --quiet; then
            echo "repo.json already up to date"
            exit 0
          fi

          git commit -m "Update repo.json for ${{ github.ref_name }}"
          git push origin HEAD:main
